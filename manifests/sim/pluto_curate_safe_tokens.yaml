# pluto_curate_safe_tokens.yaml
# Pre-screen scenario tokens for val14, random14, test14_hard. For each token,
# record at iteration 0: n_ref, n_polygon, n_agent. Tokens with n_ref>0 AND
# n_polygon>0 are "safe" for downstream pluto sim; the rest will trigger the
# 0-dim cascade in pluto's planner.
#
# Output CSV: /home/irteam/exp/pluto/curation/curate_results.csv
# Post-processing builds safe_<filter>.yaml from this CSV.
#
# Resources: CPU only (no model forward), 16 CPU + 64Gi RAM.
# Estimated runtime: ~30-60min for ~1638 tokens with parallel workers.
apiVersion: batch/v1
kind: Job
metadata:
  name: pluto-curate-safe-tokens
  namespace: p-ailab-project
spec:
  backoffLimit: 0
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        mlx.navercorp.com/zone: "private-h200-ailab-0"
      restartPolicy: Never
      imagePullSecrets:
        - name: "ailab-dockerhub-secret"
      securityContext:
        runAsUser: 500
        runAsGroup: 500
      containers:
        - name: main
          image: "ailabhanyang/ailab-docker-hub:pluto"
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "16"
              memory: "64Gi"
            limits:
              cpu: "32"
              memory: "128Gi"
          env:
            - name: NUPLAN_DATA_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/dataset"
            - name: NUPLAN_MAPS_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/maps"
            - name: NUPLAN_EXP_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/exp/pluto"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CURATE_OUT_CSV
              value: "/home/irteam/exp/pluto/curation/curate_results.csv"
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              source /opt/conda/etc/profile.d/conda.sh && conda activate pluto

              # Link both train_*, val/, test/ DBs into trainval/.
              TV=/home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval
              SPLITS=/home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/data/cache
              mkdir -p "$TV"
              for d in "$SPLITS"/train_*; do ln -sf "$d"/*.db "$TV"/; done
              ln -sf "$SPLITS"/val/*.db  "$TV"/
              ln -sf "$SPLITS"/test/*.db "$TV"/
              echo "DB count: $(ls "$TV" | wc -l)"

              cd /home/irteam/git/sangbum/pluto
              find src -type d -exec touch {}/__init__.py \;
              printf 'from src.custom_training.custom_training_builder import TrainingEngine, build_training_engine, update_config_for_training\n' > src/custom_training/__init__.py
              export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"

              # Reset CSV (idempotent run)
              mkdir -p $(dirname "$CURATE_OUT_CSV")
              rm -f "$CURATE_OUT_CSV"

              run_curate () {
                local FILT=$1
                echo "=========================================="
                echo "=== CURATE filter=$FILT ==="
                echo "=========================================="
                python run_simulation.py \
                  +simulation=closed_loop_nonreactive_agents \
                  planner=curate_planner \
                  scenario_builder=nuplan \
                  scenario_filter=$FILT \
                  worker=single_machine_thread_pool \
                  worker.max_workers=16 \
                  verbose=false \
                  experiment_uid="curate/${FILT}" || \
                  echo "[WARN] curate run for $FILT exited non-zero (some scenarios may have failed)"
              }

              run_curate val14_benchmark
              run_curate random14_benchmark
              run_curate test14_hard

              echo "=== CURATE DONE ==="
              echo "Output: $CURATE_OUT_CSV"
              ls -la "$CURATE_OUT_CSV" || echo "[ERR] CSV not produced"
              wc -l "$CURATE_OUT_CSV" 2>/dev/null || true
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /home/irteam/data
              name: data
            - mountPath: /home/irteam/exp
              name: exp
            - mountPath: /home/irteam/git
              name: git
      volumes:
        - emptyDir:
            medium: Memory
          name: dshm
        - name: data
          persistentVolumeClaim:
            claimName: data
        - name: exp
          persistentVolumeClaim:
            claimName: exp
        - name: git
          persistentVolumeClaim:
            claimName: git
