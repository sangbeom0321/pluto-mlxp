# pluto_cache_1M.yaml
# 1M scenarios cache for Phase A (paper recipe x multi-seed) and Phase D (1M hparam study).
# Uses default training_scenarios_1M filter (no type filtering, natural log distribution capped at 1M).
# Expected runtime ~6-7h (2M took 13h31m on the same hardware).
apiVersion: batch/v1
kind: Job
metadata:
  name: pluto-cache-1m
  namespace: p-ailab-project
spec:
  backoffLimit: 1
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        mlx.navercorp.com/zone: "private-h200-ailab-0"
      restartPolicy: Never
      imagePullSecrets:
        - name: "ailab-dockerhub-secret"
      securityContext:
        runAsUser: 500
        runAsGroup: 500
      containers:
        - name: main
          image: "ailabhanyang/ailab-docker-hub:pluto"
          imagePullPolicy: Always
          resources:
            limits:
              memory: "256G"
              cpu: "40"
          env:
            - name: NUPLAN_DATA_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/dataset"
            - name: NUPLAN_MAPS_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/maps"
            - name: NUPLAN_EXP_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/exp/pluto"
          command: ["bash", "-c"]
          args:
            - |
              source /opt/conda/etc/profile.d/conda.sh &&
              conda activate pluto &&

              mkdir -p /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval &&
              find /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval/ -maxdepth 1 -type l -delete &&
              for d in /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/data/cache/train_*; do
                ln -sf "$d"/*.db /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval/
              done &&
              ln -sf /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/data/cache/val/*.db /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval/ &&
              echo "DB count: $(ls /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval/ | wc -l)" &&
              export PYTHONUNBUFFERED=1 &&

              cd /home/irteam/git/sangbum/pluto &&
              find src -type d -exec touch {}/__init__.py \; &&
              printf 'from src.custom_training.custom_training_builder import TrainingEngine, build_training_engine, update_config_for_training\n' > src/custom_training/__init__.py &&
              export PYTHONPATH=$PYTHONPATH:$(pwd) &&

              python run_training.py \
                py_func=cache \
                +training=train_pluto \
                scenario_builder=nuplan \
                cache.cache_path=/home/irteam/data/32_nuPlan/nuplan/exp/pluto/cache_1M \
                cache.cleanup_cache=true \
                scenario_filter=training_scenarios_1M \
                scenario_filter.limit_total_scenarios=1000000 \
                worker.threads_per_node=40
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /home/irteam/data
              name: data
            - mountPath: /home/irteam/exp
              name: exp
            - mountPath: /home/irteam/git
              name: git
      volumes:
        - emptyDir:
            medium: Memory
          name: dshm
        - name: data
          persistentVolumeClaim:
            claimName: data
        - name: exp
          persistentVolumeClaim:
            claimName: exp
        - name: git
          persistentVolumeClaim:
            claimName: git
