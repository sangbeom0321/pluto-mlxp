# pluto_cache_val.yaml
# Adds nuPlan val14_benchmark scenarios to the existing cache_2M directory.
# Fixes the issue where pluto_cache_2M.yaml only linked train_*/*.db, leaving val scenarios absent.
# Splitter (nuplan) will classify cache entries by log_name into train/val automatically.
apiVersion: batch/v1
kind: Job
metadata:
  name: pluto-cache-val
  namespace: p-ailab-project
spec:
  backoffLimit: 1
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        mlx.navercorp.com/zone: "private-h200-ailab-0"
      restartPolicy: Never
      imagePullSecrets:
        - name: "ailab-dockerhub-secret"
      securityContext:
        runAsUser: 500
        runAsGroup: 500
      containers:
        - name: main
          image: "ailabhanyang/ailab-docker-hub:pluto"
          imagePullPolicy: Always
          resources:
            limits:
              memory: "64G"
              cpu: "8"
          env:
            - name: NUPLAN_DATA_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/dataset"
            - name: NUPLAN_MAPS_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/maps"
            - name: NUPLAN_EXP_ROOT
              value: "/home/irteam/data/32_nuPlan/nuplan/exp/pluto"
          command: ["bash", "-c"]
          args:
            - |
              source /opt/conda/etc/profile.d/conda.sh &&
              conda activate pluto &&

              mkdir -p /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval &&
              # keep existing train links, add val links on top
              for d in /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/data/cache/train_*; do
                ln -sf "$d"/*.db /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval/
              done &&
              ln -sf /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/data/cache/val/*.db \
                /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval/ &&
              echo "DB total count: $(ls /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/trainval/ | wc -l)" &&
              echo "val DB count: $(ls /home/irteam/data/32_nuPlan/nuplan/dataset/nuplan-v1.1/splits/data/cache/val/*.db | wc -l)" &&
              export PYTHONUNBUFFERED=1 &&

              cd /home/irteam/git/sangbum/pluto &&
              find src -type d -exec touch {}/__init__.py \; &&
              printf 'from src.custom_training.custom_training_builder import TrainingEngine, build_training_engine, update_config_for_training\n' > src/custom_training/__init__.py &&
              export PYTHONPATH=$PYTHONPATH:$(pwd) &&

              python run_training.py \
                py_func=cache \
                +training=train_pluto \
                scenario_builder=nuplan \
                cache.cache_path=/home/irteam/data/32_nuPlan/nuplan/exp/pluto/cache_2M \
                cache.cleanup_cache=false \
                scenario_filter=val14_benchmark \
                worker.threads_per_node=8
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /home/irteam/data
              name: data
            - mountPath: /home/irteam/exp
              name: exp
            - mountPath: /home/irteam/git
              name: git
      volumes:
        - emptyDir:
            medium: Memory
          name: dshm
        - name: data
          persistentVolumeClaim:
            claimName: data
        - name: exp
          persistentVolumeClaim:
            claimName: exp
        - name: git
          persistentVolumeClaim:
            claimName: git
